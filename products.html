<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./css/style.css">
    <title>Products - E-Commerce</title>
</head>

<body>
    <div class="overlay"></div>
    <header>
        <div class="container">
            <nav class="main-nav">
                <a href="./index.html" class="logo">MONO</a>
                <button class="menu-btn"><i class="fa-solid fa-bars"></i></button>
                <div class="menu-drawer">
                    <button class="close-menu-btn"><i class="fa-solid fa-xmark"></i></button>
                    <ul class="nav-links">
                        <li>
                            <a href="./index.html">Home</a>
                        </li>
                        <li>
                            <a href="./products.html">Products</a>
                        </li>
                        <li>
                            <button class="cart-btn">Your Cart (<span class="items-number"></span>)</button>
                        </li>
                    </ul>
                </div>
            </nav>
        </div>
    </header>
    <main>
        <!-- SHOP HEADER -->
        <section class="shop-header">
            <div class="container">
                <h1>Men's Collection</h1>
                <p>Discover premium shirts, polos, chinos, jeans and footwear.</p>
            </div>
        </section>

        <!-- PRODUCTS LIST -->
        <section class="available-products">
            <div class="container">
                <ul class="product-list products"></ul>
            </div>
        </section>
    </main>

    <aside class="cart-drawer">
        <div class="cart-header">
            <button class="close-cart-btn"><i class="fa-duotone fa-solid fa-xmark"></i></button>
            <h1 class="cart-title">Your shopping cart</h1>
        </div>
        <div class="cart-content">
            <p class="cart-empty-message"></p>
            <ul class="cart-list"></ul>
        </div>
        <div class="cart-footer">
            <p class="total">Total: <span class="sum"></span></p>
            <button class="checkout-btn">
                Checkout
            </button>
        </div>
    </aside>

    <div class="toast-container"></div>

    <footer>
        <div class="container">
            <p>© 2026 E-Commerce. All rights reserved.</p>
        </div>
    </footer>


    <script type="module" src="./js/index.js"></script>
</body>

</html>
